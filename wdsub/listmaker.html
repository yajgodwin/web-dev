<!DOCTYPE>
<html>
  <head>
    <title>List </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="listmaker.css">
  </head> 
<body>
  <script src="/web-dev/header-injection.js"></script>
<div>
  <h1>Make a List</h1>
</div>

<div id="content">
 
  <div id="input-grp"> 
    <label for="item"> New Item: </label>
    
    <input id="item" type="text">
    
    <button id="add" onclick="addItem(event)">Add Item</button>
    
    <button id="space" onclick="clearItem(event)">Clear</button>
  </div>  
  
  <div id="list-grp">
    <ul id="list">
 
      
    </ul>
  </div>
  
</div>
  <script src="listmaker.js"></script>
  </body>
</html>
